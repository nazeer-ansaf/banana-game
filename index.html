<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🍌 Banana Puzzle Game 🍌</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

    <!-- ================= LOGIN SECTION ================= -->
    <section id="login-section" class="section">
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button id="login-btn">Login</button>
        <button id="register-btn">Register</button>
    </section>

    <!-- ================= GAME SECTION ================= -->
    <section id="game-section" class="section hidden">

        <h2 id="welcome-user"></h2>

        <!-- ===== LEVEL SELECTION ===== -->
        <div id="level-select">
            <h3>Select Level</h3>

            <!-- Container for dynamic level buttons -->
            <div id="level-buttons-container"></div>

            <!-- Level Info -->
            <div id="level-info"></div>
        </div>

        <!-- ===== GAME CONTENT ===== -->
        <div id="game-content" class="hidden">

            <div id="current-level" class="game-header">
                Level <span id="level-number">1</span>
            </div>

            <div id="puzzle-container">
                <img id="puzzle-image" alt="Puzzle Image">
                <p>Time Left: <span id="timer">60s</span></p>
            </div>

            <div id="answer-container">
                <input type="number" id="answer-input" placeholder="Enter answer">
                <button id="submit-btn">Submit</button>
            </div>

            <p id="message"></p>
            <p>Score: <span id="score">0</span></p>
            <p>Wrong Attempts: <span id="wrong-count">0</span></p>

            <button id="stop-btn">Stop Game</button>
            <button id="logout-btn">Logout</button>

        </div>

        <!-- ================= STOP GAME SCREEN ================= -->
        <div id="stop-screen" class="hidden">

            <h2>🏁 Game Stopped!</h2>

            <div class="final-score">
                Your Score: <span id="final-score">0</span>
            </div>

            <!-- Leaderboard -->
            <div id="leaderboard-panel">
                <h3>🏆 Leaderboard</h3>
                <ul id="leaderboard-list"></ul>
            </div>

            <!-- Action Buttons -->
            <div class="stop-actions">
                <button id="retry-btn">🔄 Retry</button>
                <button id="final-logout-btn">🚪 Logout</button>
            </div>

        </div>

    </section>

</div>

<!-- Scripts -->
<script type="module" src="js/main.js"></script>

</body>
</html>
