<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍌 Banana Puzzle Game 🍌</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">

        <!-- ================= LOGIN SECTION ================= -->
        <section id="login-section" class="section">
            <input type="text" id="username" placeholder="Username" aria-label="Username">
            <input type="password" id="password" placeholder="Password" aria-label="Password">
            <button id="login-btn">Login</button>
            <button id="register-btn">Register</button>
        </section>

        <!-- ================= GAME SECTION ================= -->
        <section id="game-section" class="section hidden">

            <!-- Welcome -->
            <h2 id="welcome-user"></h2>

            <!-- LEVEL SELECTION -->
            <div id="level-select">
                <h3>Select Level</h3>
                <div id="level-buttons-container"></div>
                <div id="level-info"></div>
            </div>

            <!-- GAME CONTENT -->
            <div id="game-content" class="hidden">
                

                <!-- Level Indicator -->
                <div id="current-level" class="game-header">
                    Level <span id="level-number">1</span>
                </div>

                <!-- Puzzle Container -->
                <div id="puzzle-container">
                    <img id="puzzle-image" alt="Puzzle Image">
                    <p>Time Left: <span id="timer">60s</span></p>
                </div>

                <!-- Toast message -->
                <p id="message"></p>

                <!-- Answer Input -->
                <div id="answer-container">
                    <input type="number" id="answer-input" placeholder="Enter answer" aria-label="Answer input">
                    <button id="submit-btn">Submit</button>
                </div>

                <!-- Score & Attempts -->
                <div class="score-display">

    <div class="score-badge">
        🍌 Score
        <span id="score">0</span>
    </div>

    <div class="score-badge wrong">
        ❌ Attempts
        <span id="wrong-count">0</span>
    </div>

</div>
                <!-- Action Buttons -->
                <button id="stop-btn">Stop Game</button>
                <button id="logout-btn">Logout</button>
            </div>

            <!-- STOP SCREEN -->
            <div id="stop-screen" class="hidden stop-panel">

    <h2 class="stop-title">🏁 Game Finished</h2>

    <div class="final-score-card">
        🍌 Your Score
        <span id="final-score">0</span>
    </div>

    <div id="leaderboard-panel">
        <h3 class="leaderboard-title">👑 Leaderboard</h3>
        <ul id="leaderboard-list"></ul>
    </div>

    <div class="stop-actions">
        <button id="retry-btn">🔄 Play Again</button>
        <button id="final-logout-btn">🚪 Logout</button>
    </div>

</div>

        </section>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
